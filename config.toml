enable-magisk-update = false
parallel-jobs = 1

[YouTube-RV]
app-name = "YouTube"
rv-brand = "RV"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

[Music-RV]
app-name = "Music"
rv-brand = "RV"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
arch = "arm64-v8a"

[Photos-RV]
app-name = "Photos"
rv-brand = "RV"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/photos/"
uptodown-dlurl = "https://google-photos.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.photos"
arch = "arm64-v8a"


[YouTube-RVX]
app-name = "YouTube"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
patches-version = "dev"
patcher-args = "-e 'Custom Shorts action buttons' -OiconType=outline -e 'Custom branding icon for YouTube' -OappIcon=afn_blue -OrestoreOldSplashAnimation=true -e 'Overlay buttons' -OiconType=thin"
excluded-patches = "'Custom branding name for YouTube'"
included-patches = "'Custom header for YouTube'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

[Music-RVX]
app-name = "Music"
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
patches-version = "dev"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon=afn_blue -OrestoreOldSplashIcon=true"
excluded-patches = "'Custom branding name for YouTube Music'"
included-patches = "'Custom header for YouTube Music'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
arch = "arm64-v8a"
